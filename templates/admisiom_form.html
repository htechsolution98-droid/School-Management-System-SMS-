<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic Admission Form</title>

<style>
    body {
        font-family: Arial;
        background: #f4f6f9;
        padding: 20px;
    }

    .container {
        max-width: 700px;
        margin: auto;
        background: #fff;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
    }

    input, textarea {
        width: 100%;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    h3 {
        margin-top: 20px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Student Admission Form</h2>

    <form id="studentForm">

        <!-- Basic Info -->
        <div class="form-group">
            <label>First Name</label>
            <input type="text" name="first_name" required>
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="last_name" required>
        </div>

        

        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" required>
        </div>

        <!-- Academic Info -->
        <h3>Academic Info</h3>

        <div class="form-group">
            <label>Roll Number</label>
            <input type="text" name="roll_number" required>
        </div>

        <div class="form-group">
            <label>Course</label>
            <input type="text" name="course" required>
        </div>

        <div class="form-group">
            <label>Year</label>
            <input type="number" name="year">
        </div>

        <!-- Personal Info -->
        <h3>Personal Info</h3>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="date_of_birth">
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address"></textarea>
        </div>

        <!-- Status -->
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_active" checked>
                Active
            </label>
        </div>

        <!-- Extra Data Dynamic Fields -->
        <h3>Extra Details</h3>
        <div id="extraFields"></div>

        <button type="submit">Submit</button>

    </form>
</div>

<script>
    let id = {{ request.GET.id }} 
    console.log(id)
const API_URL = `http://127.0.0.1:8000/api/StudentView/${id}`;

async function loadExtraFields() {
    const res = await fetch(API_URL);
    const data = await res.json();

    const extraData = data.extra_data;
    const container = document.getElementById("extraFields");

    if (!extraData) return;

    Object.keys(extraData).forEach(key => {
        const div = document.createElement("div");
        div.classList.add("form-group");

        const label = document.createElement("label");
        label.innerText = key.replace("_", " ").toUpperCase();

        let input;

        if (key.toLowerCase().includes("note")) {
            input = document.createElement("textarea");
        } else {
            input = document.createElement("input");
            input.type = "text";
        }

        input.name = key;
        input.value = extraData[key] || "";

        div.appendChild(label);
        div.appendChild(input);

        container.appendChild(div);
    });
}

loadExtraFields();


document.getElementById("studentForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    let payload = {
        first_name: formData.get("first_name"),
        last_name: formData.get("last_name"),
        phone: formData.get("phone"),

        roll_number: formData.get("roll_number"),
        course: formData.get("course"),
        year: formData.get("year") ? parseInt(formData.get("year")) : null,
        date_of_birth: formData.get("date_of_birth") || null,
        address: formData.get("address"),
        is_active: formData.get("is_active") ? true : false,

        extra_data: {}

        
    };

    // collect dynamic extra fields
    formData.forEach((value, key) => {
        if (![
            "first_name","last_name","email","phone",
            "roll_number","course","year",
            "date_of_birth","address","is_active"
        ].includes(key)) {
            payload.extra_data[key] = value;
        }
    });

    const res = await fetch("http://127.0.0.1:8000/api/StudentFIllView/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    });

    const result = await res.json();
    console.log(result);
});
</script>

</body>
</html>
