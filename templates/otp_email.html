<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>
</head>
<body style="font-family: Arial, sans-serif; background-color:#f4f4f4; padding:20px;">
    <div style="max-width:500px; margin:auto; background:#ffffff; padding:20px; border-radius:10px;">
        
        <h2 style="color:#333;">🔐 OTP Verification</h2>
        
        <p>Hello {{ user_name|default:"User" }},</p>
        
        <p>Use the OTP below to complete your verification:</p>
        
        <h1 style="letter-spacing:5px; color:#2c3e50;">{{ otp }}</h1>
        
        <p>This OTP is valid for <strong>5 minutes</strong>.</p>
        
        <p style="color:red;">Do not share this code with anyone.</p>
        
        <hr>
        
        <p style="font-size:12px; color:#888;">
            If you did not request this, please ignore this email.
        </p>
        
        <p>Thanks,<br><strong>Your Company</strong></p>
        
    </div>
</body>
</html>
